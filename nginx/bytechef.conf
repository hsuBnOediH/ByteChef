# ── nginx/bytechef.conf ──────────────────────────────────────────────────────
#
# Nginx reverse-proxy config for ByteChef.
# Place this file in /etc/nginx/sites-available/bytechef.conf on your GCP VM,
# then symlink it and reload Nginx:
#
#   sudo ln -s /etc/nginx/sites-available/bytechef.conf \
#              /etc/nginx/sites-enabled/bytechef.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Your domain is already pointed at the VM's IP via DNS
#   - Certbot is installed for HTTPS:
#       sudo apt install certbot python3-certbot-nginx
#       sudo certbot --nginx -d kitchen.yourdomain.com
#
# Replace KITCHEN_DOMAIN below with your actual subdomain.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name KITCHEN_DOMAIN;    # e.g., kitchen.yourdomain.com

    # Certbot will add HTTPS redirect here automatically.
    # Leave this block for Certbot to manage.

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket support (Streamlit uses WebSockets for live updates)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — Streamlit can be slow to respond on first load
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }
}
